name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
    paths-ignore: [ "**/*.md" ]
  pull_request:
    branches: [ "main" ]
    paths-ignore: [ "**/*.md" ]

jobs:
  fmt:
    runs-on: ubuntu-latest
    container: rust:slim
    steps:
      - uses: actions/checkout@v4

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    container: rust:slim
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: apt-get update && apt-get install -y --no-install-recommends build-essential pkg-config

      - name: Install clippy
        run: rustup component add clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    container: rust:slim
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: apt-get update && apt-get install -y --no-install-recommends build-essential pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Test
        run: cargo test --workspace

  build:
    if: github.event_name == 'push'
    needs: [fmt, clippy, test]
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ghcr.io/actorfield/unitycatalog:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/actorfield/unitycatalog:latest \
            -t ghcr.io/actorfield/unitycatalog:${{ github.sha }} \
            ghcr.io/actorfield/unitycatalog:${{ github.sha }}-amd64 \
            ghcr.io/actorfield/unitycatalog:${{ github.sha }}-arm64
