[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
# g  = subject hierarchy  : user -> group
# g2 = object hierarchy   : table -> schema -> catalog -> metastore (child -> parent)
# g3 = privilege hierarchy: OWNER -> ALL_PRIVILEGES -> {specific privileges}
g = _, _
g2 = _, _
g3 = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# A grant (p) authorizes a request (r) when, across all three dimensions, the
# granted side covers the requested side:
#  - g(p.sub, r.sub) : the grant's principal is the caller (or a group they're in)
#  - g2(r.obj, p.obj): the requested object rolls UP to the granted object, so a
#                      grant on a parent (catalog/schema) covers its children.
#                      Reflexive, so a direct grant on the object also matches.
#  - g3(p.act, r.act): the granted privilege implies the requested one, so OWNER /
#                      ALL_PRIVILEGES satisfy any specific privilege. Reflexive,
#                      so a direct privilege grant matches itself.
# OWNER is no longer special-cased: it cascades through g2 like any privilege.
m = g(p.sub, r.sub) && g2(r.obj, p.obj) && g3(p.act, r.act)
